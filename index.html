<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Day Log</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Day Log">
<meta name="theme-color" content="#FAF9F5">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="%231C2733"/><path d="M28 52 l14 14 30-32" stroke="%23E8E4DA" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>'>
<style>
  :root {
    --paper: #FAF9F5;
    --card: #FFFFFF;
    --ink: #1C2733;
    --ink-soft: #5C6670;
    --hairline: #E3DFD6;
    --done: #2E7D5B;
    --done-wash: #EAF3EE;
    --missed: #B4553B;
    --missed-wash: #F7ECE8;
    --watch: #B07C2E;
    --watch-wash: #F6EFE2;
    --skip: #8A8F98;
    --skip-wash: #EFEFED;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body {
    font: 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100%;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 480px; margin: 0 auto; padding: 20px 18px calc(76px + env(safe-area-inset-bottom)); }

  /* Header */
  header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; }
  .brand { font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-soft); }
  .gear { background: none; border: none; font-size: 18px; color: var(--ink-soft); padding: 6px; cursor: pointer; }

  .datebar { display: flex; align-items: center; justify-content: space-between; margin: 10px 0 4px; }
  .datebar h1 {
    font-family: ui-serif, "New York", Georgia, serif;
    font-size: 28px; font-weight: 600; letter-spacing: -0.01em;
  }
  .datebar .sub { color: var(--ink-soft); font-size: 14px; margin-top: 2px; }
  .nav { display: flex; gap: 6px; }
  .nav button {
    width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--hairline);
    background: var(--card); color: var(--ink); font-size: 18px; cursor: pointer;
  }
  .nav button:disabled { opacity: 0.35; }

  /* Day ribbon — one segment per habit */
  .ribbon { display: flex; gap: 4px; margin: 14px 0 18px; }
  .ribbon span {
    flex: 1; height: 5px; border-radius: 3px; background: var(--hairline);
    transition: background 0.25s ease;
  }
  .ribbon span.done { background: var(--done); }
  .ribbon span.missed { background: var(--missed); }
  .ribbon span.skipped { background: var(--skip); }

  /* Habit rows */
  .habit {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    width: 100%; text-align: left;
    background: var(--card); border: 1px solid var(--hairline); border-radius: 14px;
    padding: 15px 16px; margin-bottom: 10px; cursor: pointer;
    font: inherit; color: inherit;
    transition: background 0.2s ease, border-color 0.2s ease;
  }
  .habit .name { flex: 1; }
  .habit .state {
    flex-shrink: 0; min-width: 74px; text-align: center;
    font-size: 13px; font-weight: 600; letter-spacing: 0.02em;
    padding: 6px 10px; border-radius: 999px;
    background: var(--paper); color: var(--ink-soft); border: 1px dashed var(--hairline);
  }
  .habit.done   { background: var(--done-wash);   border-color: var(--done); }
  .habit.missed { background: var(--missed-wash); border-color: var(--missed); }
  .habit.skipped{ background: var(--skip-wash); }
  .habit.done .state   { background: var(--done);   color: #fff; border: none; }
  .habit.missed .state { background: var(--missed); color: #fff; border: none; }
  .habit.skipped .state{ background: var(--skip);   color: #fff; border: none; }
  @media (prefers-reduced-motion: no-preference) {
    .habit .state { transition: transform 0.15s ease; }
    .habit:active .state { transform: scale(0.92); }
  }

  /* Note */
  textarea {
    width: 100%; min-height: 64px; resize: vertical;
    font: inherit; color: inherit;
    background: var(--card); border: 1px solid var(--hairline); border-radius: 14px;
    padding: 12px 14px; margin: 8px 0 16px;
  }
  textarea::placeholder { color: var(--ink-soft); }

  /* Commit */
  .commit {
    width: 100%; padding: 15px; border: none; border-radius: 14px;
    background: var(--ink); color: var(--paper);
    font: 600 16px/1 inherit; letter-spacing: 0.02em; cursor: pointer;
  }
  .commit:disabled { opacity: 0.5; }
  .status { text-align: center; font-size: 13px; color: var(--ink-soft); margin-top: 12px; min-height: 18px; }
  .status.err { color: var(--missed); }

  /* Settings panel */
  .panel { margin-top: 8px; }
  .panel label { display: block; font-size: 13px; color: var(--ink-soft); margin: 14px 0 5px; }
  .panel input {
    width: 100%; font: inherit; color: inherit;
    background: var(--card); border: 1px solid var(--hairline); border-radius: 12px; padding: 12px 14px;
  }
  .panel .hint { font-size: 13px; color: var(--ink-soft); margin-top: 16px; line-height: 1.5; }
  .panel .hint a { color: var(--ink); }
  /* Tab bar */
  .tabbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    background: var(--card); border-top: 1px solid var(--hairline);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .tabrow { max-width: 480px; margin: 0 auto; display: flex; }
  .tabrow button {
    flex: 1; background: none; border: none; padding: 14px 0 12px;
    font: 600 13px/1 inherit; letter-spacing: 0.04em;
    color: var(--ink-soft); cursor: pointer;
  }
  .tabrow button.active { color: var(--ink); }

  /* Progress */
  .statrow { display: flex; gap: 10px; margin: 14px 0 18px; }
  .statcard {
    flex: 1; background: var(--card); border: 1px solid var(--hairline); border-radius: 14px;
    padding: 12px 10px 10px; text-align: center;
  }
  .statcard .num { font-family: ui-serif, "New York", Georgia, serif; font-size: 24px; font-weight: 600; }
  .statcard .lbl { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
  .phabit {
    background: var(--card); border: 1px solid var(--hairline); border-radius: 14px;
    padding: 12px 16px 13px; margin-bottom: 10px;
  }
  .phabit .top { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
  .phabit .name { flex: 1; font-size: 14px; }
  .phabit .meta { color: var(--ink-soft); font-size: 12px; white-space: nowrap; }
  .cells { display: flex; gap: 3px; }
  .cells span { flex: 1; max-width: 14px; height: 14px; border-radius: 4px; background: var(--paper); border: 1px solid var(--hairline); }
  .cells span.done    { background: var(--done);   border-color: var(--done); }
  .cells span.missed  { background: var(--missed); border-color: var(--missed); }
  .cells span.skipped { background: var(--skip);   border-color: var(--skip); }
  .heatcap { display: flex; justify-content: space-between; font-size: 12px; color: var(--ink-soft); margin: 2px 2px 14px; }
  .empty { color: var(--ink-soft); font-size: 14px; text-align: center; margin-top: 28px; }

  /* Plan */
  .weekcard {
    background: var(--card); border: 1.5px solid var(--ink); border-radius: 14px;
    padding: 14px 16px; margin: 14px 0 6px; font-size: 15px;
  }
  .weekcard .wk { font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 3px; }
  .weekcard .next { margin-top: 12px; }
  .md h2 { font-family: ui-serif, "New York", Georgia, serif; font-size: 21px; font-weight: 600; margin: 26px 0 8px; }
  .md h3 { font-size: 16px; margin: 20px 0 6px; }
  .md h4 { font-size: 15px; margin: 16px 0 4px; }
  .md p { margin: 8px 0; font-size: 15px; }
  .md ul { margin: 8px 0 8px 20px; font-size: 15px; }
  .md li { margin: 5px 0; }
  .md .wl { border-bottom: 1px dotted var(--ink-soft); }
  .md .tblwrap { overflow-x: auto; margin: 10px -18px; padding: 0 18px; }
  .md table { border-collapse: collapse; font-size: 14px; }
  .md th, .md td { border: 1px solid var(--hairline); padding: 6px 10px; text-align: left; vertical-align: top; min-width: 44px; }
  .md th { background: var(--card); white-space: nowrap; }

  /* Meals */
  .sumline { display: flex; align-items: baseline; gap: 7px; flex-wrap: wrap; margin: 12px 0 16px; font-variant-numeric: tabular-nums; }
  .sumline .kcal { font-family: ui-serif, "New York", Georgia, serif; font-size: 40px; font-weight: 600; line-height: 1; letter-spacing: -0.02em; }
  .sumline .unit { font-size: 14px; color: var(--ink-soft); }
  .sumline .unit b { color: var(--ink); font-weight: 600; }
  .sumline .sep { color: var(--hairline); }
  .mcard { background: var(--card); border: 1px solid var(--hairline); border-radius: 14px; padding: 14px 14px 12px; margin-bottom: 12px; }
  .mtitle { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .mtitle h3 { font-size: 12px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--ink-soft); font-weight: 600; }
  .mtitle .why { font-size: 11px; color: var(--skip); }
  .strip { padding: 9px 0 7px; border-bottom: 1px solid var(--hairline); }
  .strip:last-child { border-bottom: 0; padding-bottom: 3px; }
  .strip .top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 7px; }
  .strip .name { font-size: 14px; font-weight: 600; }
  .strip .name small { font-size: 11px; font-weight: 500; color: var(--skip); margin-left: 6px; letter-spacing: 0.03em; }
  .strip .val { font-family: ui-serif, "New York", Georgia, serif; font-size: 17px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .strip .val small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; color: var(--ink-soft); font-weight: 400; }
  .band { position: relative; height: 12px; display: flex; }
  .band .zone { height: 100%; }
  .band .zone:first-child { border-radius: 6px 0 0 6px; }
  .band .zone:last-child { border-radius: 0 6px 6px 0; }
  .band .z-good { background: var(--done-wash); }
  .band .z-watch { background: var(--watch-wash); }
  .band .z-over { background: var(--missed-wash); }
  .band .capmark { position: absolute; top: -2px; bottom: -2px; width: 1px; background: #D8D3C8; }
  .band .tick { position: absolute; top: -3px; width: 3px; height: 18px; border-radius: 2px; transform: translateX(-50%); }
  .tick.good { background: var(--done); }
  .tick.watch { background: var(--watch); }
  .tick.over { background: var(--missed); }
  .strip .capnote { font-size: 11.5px; color: var(--skip); margin-top: 6px; }
  .meal-row { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--hairline); font-size: 13.5px; align-items: baseline; }
  .meal-row:last-child { border-bottom: 0; }
  .meal-row .t { color: var(--skip); font-variant-numeric: tabular-nums; flex: 0 0 40px; font-size: 12.5px; }
  .meal-row .what { flex: 1; }
  .meal-row .kc { font-variant-numeric: tabular-nums; color: var(--ink-soft); font-size: 12.5px; }
  .res { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: 1px; }
  .res.reg { background: var(--done); }
  .res.rec { background: linear-gradient(90deg, var(--done) 50%, var(--done-wash) 50%); border: 1px solid var(--done); width: 7px; height: 7px; }
  .res.est { background: transparent; border: 1.5px solid var(--skip); width: 6px; height: 6px; }
  .mlegend { display: flex; gap: 14px; margin-top: 9px; font-size: 11px; color: var(--skip); }
  .mlegend span { display: flex; align-items: center; gap: 5px; }
  .spark-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--hairline); }
  .spark-row:last-child { border-bottom: 0; }
  .spark-row .lbl { flex: 0 0 76px; font-size: 12.5px; color: var(--ink-soft); }
  .spark-row svg { flex: 1; height: 30px; display: block; min-width: 0; }
  .spark-row .now { flex: 0 0 74px; text-align: right; font-family: ui-serif, "New York", Georgia, serif; font-size: 15px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .spark-row .now small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 10.5px; color: var(--skip); font-weight: 400; display: block; }
  .capline { text-align: center; font-size: 11.5px; color: var(--skip); margin: 2px 0 8px; }
  .capline b { color: var(--ink-soft); }

  .hidden { display: none; }
  button:focus-visible, .habit:focus-visible, input:focus-visible, textarea:focus-visible {
    outline: 2px solid var(--ink); outline-offset: 2px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">Day Log</div>
    <button class="gear" id="gearBtn" aria-label="Settings">&#9881;&#65038;</button>
  </header>

  <!-- Settings -->
  <section id="settings" class="panel hidden">
    <div class="datebar"><h1>Setup</h1></div>
    <label for="cfgRepo">Repository (owner/name)</label>
    <input id="cfgRepo" autocapitalize="none" autocorrect="off" placeholder="bykau/personal-improvement">
    <label for="cfgToken">Fine-grained token</label>
    <input id="cfgToken" type="password" autocapitalize="none" placeholder="github_pat_…">
    <div style="margin-top:18px">
      <button class="commit" id="connectBtn">Connect</button>
    </div>
    <p class="hint">
      Create the token at <a href="https://github.com/settings/personal-access-tokens/new">github.com/settings/personal-access-tokens/new</a>:
      Repository access → “Only select repositories” → this repo · Permissions → Contents: Read and write.
      The token stays on this device.
    </p>
    <div class="status" id="setupStatus"></div>
  </section>

  <!-- Main -->
  <section id="main" class="hidden">
    <div class="datebar">
      <div>
        <h1 id="dateTitle"></h1>
        <div class="sub" id="dateSub"></div>
      </div>
      <div class="nav">
        <button id="prevBtn" aria-label="Previous day">&#8249;</button>
        <button id="nextBtn" aria-label="Next day">&#8250;</button>
      </div>
    </div>
    <div class="ribbon" id="ribbon" aria-hidden="true"></div>
    <div id="habits"></div>
    <textarea id="note" placeholder="Note for the day (optional)"></textarea>
    <button class="commit" id="commitBtn">Commit day</button>
    <div class="status" id="status">&nbsp;</div>
  </section>

  <!-- Progress -->
  <section id="progress" class="hidden">
    <div class="datebar"><h1>Progress</h1></div>
    <div id="progressBody"></div>
  </section>

  <!-- Meals -->
  <section id="meals" class="hidden">
    <div class="datebar">
      <div>
        <h1>Meals</h1>
        <div class="sub" id="mealsSub"></div>
      </div>
    </div>
    <div class="status" id="mealsStatus"></div>
    <div id="mealsBody"></div>
  </section>

  <!-- Plan -->
  <section id="plan" class="hidden">
    <div class="datebar"><h1>Plan</h1></div>
    <div class="status" id="planStatus"></div>
    <div id="planBody" class="md"></div>
  </section>
</div>

<nav class="tabbar">
  <div class="tabrow">
    <button type="button" data-tab="main" class="active">Today</button>
    <button type="button" data-tab="progress">Progress</button>
    <button type="button" data-tab="meals">Meals</button>
    <button type="button" data-tab="plan">Plan</button>
  </div>
</nav>

<script>
(function () {
  'use strict';
  const API = 'https://api.github.com';
  const CYCLE = ['', 'done', 'missed', 'skipped'];
  const LABELS = { '': 'mark', done: 'done', missed: 'missed', skipped: 'skipped' };
  const LS_CFG = 'daylog.config', LS_DRAFT = 'daylog.draft.';

  let cfg = null;            // {repo, token}
  let habits = [];           // [{id, name, active}]
  let date = today();        // 'YYYY-MM-DD'
  let marks = {};            // habitId -> status
  let note = '';
  let remoteRows = [];       // all parsed rows of habits.csv
  let noteRows = [];         // all parsed rows of notes.csv
  let shas = {};             // path -> sha
  let dirty = false;

  const $ = id => document.getElementById(id);

  function today() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }
  function shiftDate(iso, days) {
    const [y, m, d] = iso.split('-').map(Number);
    const dt = new Date(y, m - 1, d + days);
    return dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0') + '-' + String(dt.getDate()).padStart(2, '0');
  }
  function prettyDate(iso) {
    const [y, m, d] = iso.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    return dt.toLocaleDateString('en-US', { weekday: 'long' }) + ', ' +
           dt.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
  }

  // ---------- CSV ----------
  function csvEscape(v) {
    return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
  }
  function csvParse(text) {
    const rows = []; let row = [], field = '', q = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (q) {
        if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else q = false; }
        else field += c;
      } else if (c === '"') q = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c !== '\r') field += c;
    }
    if (field !== '' || row.length) { row.push(field); rows.push(row); }
    return rows;
  }
  function csvSerialize(rows) {
    return rows.map(r => r.map(csvEscape).join(',')).join('\n') + '\n';
  }

  // ---------- GitHub ----------
  function b64encode(str) {
    return btoa(String.fromCharCode(...new TextEncoder().encode(str)));
  }
  function b64decode(b64) {
    return new TextDecoder().decode(Uint8Array.from(atob(b64.replace(/\s/g, '')), c => c.charCodeAt(0)));
  }
  async function ghGet(path) {
    const res = await fetch(`${API}/repos/${cfg.repo}/contents/${path}?t=${Date.now()}`, {
      headers: { Authorization: 'Bearer ' + cfg.token, Accept: 'application/vnd.github+json' },
      cache: 'no-store'
    });
    if (res.status === 404) return null;
    if (!res.ok) throw new Error(`GET ${path}: ${res.status}`);
    const j = await res.json();
    shas[path] = j.sha;
    return b64decode(j.content);
  }
  async function ghPut(path, content, message) {
    const body = { message, content: b64encode(content) };
    if (shas[path]) body.sha = shas[path];
    const res = await fetch(`${API}/repos/${cfg.repo}/contents/${path}`, {
      method: 'PUT',
      headers: { Authorization: 'Bearer ' + cfg.token, Accept: 'application/vnd.github+json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const t = await res.text();
      throw new Error(`PUT ${path}: ${res.status} ${t.slice(0, 120)}`);
    }
    const j = await res.json();
    shas[path] = j.content.sha;
    return j.commit.sha.slice(0, 7);
  }

  // ---------- data ----------
  async function loadAll() {
    setStatus('Loading…');
    const [habitsJson, logCsv, notesCsv] = await Promise.all([
      ghGet('data/habits.json'), ghGet('data/habits.csv'), ghGet('data/notes.csv')
    ]);
    if (!habitsJson) throw new Error('data/habits.json not found in repo');
    habits = JSON.parse(habitsJson).habits.filter(h => h.active !== false);
    remoteRows = logCsv ? csvParse(logCsv).slice(1) : [];
    noteRows = notesCsv ? csvParse(notesCsv).slice(1) : [];
    loadDay();
    setStatus(' ');
  }
  function loadDay() {
    marks = {}; note = '';
    for (const r of remoteRows) if (r[0] === date) marks[r[1]] = r[2];
    for (const r of noteRows) if (r[0] === date) note = r[1];
    const draft = localStorage.getItem(LS_DRAFT + date);
    if (draft) {
      const d = JSON.parse(draft);
      marks = d.marks; note = d.note;
      dirty = true;
    } else dirty = false;
    render();
  }
  function saveDraft() {
    localStorage.setItem(LS_DRAFT + date, JSON.stringify({ marks, note }));
    dirty = true;
  }

  async function commitDay() {
    const btn = $('commitBtn');
    btn.disabled = true;
    setStatus('Saving…');
    try {
      // refresh shas/content to avoid clobbering concurrent edits
      const [logCsv, notesCsv] = await Promise.all([ghGet('data/habits.csv'), ghGet('data/notes.csv')]);
      remoteRows = logCsv ? csvParse(logCsv).slice(1) : [];
      noteRows = notesCsv ? csvParse(notesCsv).slice(1) : [];

      const keep = remoteRows.filter(r => r[0] !== date);
      for (const h of habits) if (marks[h.id]) keep.push([date, h.id, marks[h.id]]);
      keep.sort((a, b) => a[0] < b[0] ? -1 : a[0] > b[0] ? 1 : 0);
      const c1 = await ghPut('data/habits.csv',
        csvSerialize([['date', 'habit', 'status'], ...keep]), `log: ${date}`);

      let commit = c1;
      const keepNotes = noteRows.filter(r => r[0] !== date);
      const hadNote = noteRows.length !== keepNotes.length;
      if (note.trim()) keepNotes.push([date, note.trim()]);
      if (note.trim() || hadNote) {
        keepNotes.sort((a, b) => a[0] < b[0] ? -1 : a[0] > b[0] ? 1 : 0);
        commit = await ghPut('data/notes.csv',
          csvSerialize([['date', 'note'], ...keepNotes]), `note: ${date}`);
      }
      remoteRows = keep; noteRows = keepNotes;
      localStorage.removeItem(LS_DRAFT + date);
      dirty = false;
      const t = new Date();
      setStatus(`Saved ${String(t.getHours()).padStart(2, '0')}:${String(t.getMinutes()).padStart(2, '0')} · commit ${commit}`);
    } catch (e) {
      saveDraft();
      setStatus('Save failed — draft kept on this phone. ' + e.message, true);
    }
    btn.disabled = false;
  }

  // ---------- render ----------
  function setStatus(msg, err) {
    const el = $('status');
    el.textContent = msg;
    el.className = 'status' + (err ? ' err' : '');
  }
  function render() {
    $('dateTitle').textContent = date === today() ? 'Today' : prettyDate(date);
    $('dateSub').textContent = date === today() ? prettyDate(date) : date;
    $('nextBtn').disabled = date >= today();
    $('note').value = note;

    const ribbon = $('ribbon');
    ribbon.innerHTML = '';
    const list = $('habits');
    list.innerHTML = '';
    for (const h of habits) {
      const st = marks[h.id] || '';
      const seg = document.createElement('span');
      if (st) seg.className = st;
      ribbon.appendChild(seg);

      const row = document.createElement('button');
      row.type = 'button';
      row.className = 'habit' + (st ? ' ' + st : '');
      row.innerHTML = `<span class="name"></span><span class="state">${LABELS[st]}</span>`;
      row.querySelector('.name').textContent = h.name;
      row.addEventListener('click', () => {
        const next = CYCLE[(CYCLE.indexOf(marks[h.id] || '') + 1) % CYCLE.length];
        if (next) marks[h.id] = next; else delete marks[h.id];
        saveDraft();
        render();
      });
      list.appendChild(row);
    }
    if (dirty) setStatus('Unsaved changes');
  }

  // ---------- progress ----------
  function shortDate(iso) {
    const [y, m, d] = iso.split('-').map(Number);
    return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }
  function renderProgress() {
    const body = $('progressBody');
    body.innerHTML = '';
    if (!habits.length || !remoteRows.length) {
      body.innerHTML = `<p class="empty">${habits.length ? 'No days logged yet.' : 'Data not loaded — check connection in settings.'}</p>`;
      return;
    }
    // index: habitId -> (date -> status), plus first logged date
    const idx = new Map();
    let first = today();
    for (const r of remoteRows) {
      if (!idx.has(r[1])) idx.set(r[1], new Map());
      idx.get(r[1]).set(r[0], r[2]);
      if (r[0] < first) first = r[0];
    }
    const days = [];
    for (let d = first; d <= today(); d = shiftDate(d, 1)) days.push(d);
    const shown = days.slice(-28);

    // adherence = done / (done + missed); skipped and unlogged excluded
    const rate = (habitId, lastN) => {
      const from = lastN ? shiftDate(today(), -(lastN - 1)) : '';
      let done = 0, missed = 0;
      for (const r of remoteRows) {
        if (r[0] < from || (habitId && r[1] !== habitId)) continue;
        if (r[2] === 'done') done++; else if (r[2] === 'missed') missed++;
      }
      return done + missed ? Math.round(100 * done / (done + missed)) + '%' : '—';
    };
    const streak = habitId => {
      const m = idx.get(habitId) || new Map();
      let d = today(), n = 0;
      if (!m.has(d)) d = shiftDate(d, -1); // today not logged yet — start from yesterday
      for (; d >= first; d = shiftDate(d, -1)) {
        const st = m.get(d);
        if (st === 'done') n++;
        else if (st !== 'skipped') break; // skipped days pass through; missed/unlogged break
      }
      return n;
    };

    const stats = document.createElement('div');
    stats.className = 'statrow';
    for (const [lbl, n] of [['7 days', 7], ['30 days', 30], ['overall', 0]]) {
      const c = document.createElement('div');
      c.className = 'statcard';
      c.innerHTML = '<div class="num"></div><div class="lbl"></div>';
      c.querySelector('.num').textContent = rate(null, n);
      c.querySelector('.lbl').textContent = lbl;
      stats.appendChild(c);
    }
    body.appendChild(stats);

    for (const h of habits) {
      const m = idx.get(h.id) || new Map();
      const card = document.createElement('div');
      card.className = 'phabit';
      const top = document.createElement('div');
      top.className = 'top';
      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = h.name;
      const meta = document.createElement('span');
      meta.className = 'meta';
      const s = streak(h.id);
      meta.textContent = (s ? s + '-day streak' : 'no streak') + ' · ' + rate(h.id, 7) + ' 7d';
      top.append(name, meta);
      const cells = document.createElement('div');
      cells.className = 'cells';
      for (const d of shown) {
        const cell = document.createElement('span');
        const st = m.get(d);
        if (st) cell.className = st;
        cell.title = d + (st ? ' — ' + st : '');
        cells.appendChild(cell);
      }
      card.append(top, cells);
      body.appendChild(card);
    }
    const cap = document.createElement('div');
    cap.className = 'heatcap';
    cap.innerHTML = '<span></span><span></span>';
    cap.children[0].textContent = shortDate(shown[0]);
    cap.children[1].textContent = shortDate(shown[shown.length - 1]);
    body.appendChild(cap);
  }

  // ---------- markdown (minimal: headings, lists, tables, bold, wikilinks) ----------
  function escHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function stripFrontmatter(t) {
    if (!t.startsWith('---')) return t;
    const end = t.indexOf('\n---', 3);
    if (end === -1) return t;
    return t.slice(t.indexOf('\n', end + 1) + 1);
  }
  function mdInline(s) {
    return escHtml(s)
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\[\[([^\]]+)\]\]/g, '<span class="wl">$1</span>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '$1');
  }
  function mdRender(text) {
    const out = [];
    let list = null, table = null;
    const flushList = () => { if (list) { out.push('<ul>' + list.join('') + '</ul>'); list = null; } };
    const flushTable = () => {
      if (table) {
        out.push('<div class="tblwrap"><table>' + table.map((cells, i) =>
          '<tr>' + cells.map(c => i === 0 ? `<th>${mdInline(c)}</th>` : `<td>${mdInline(c)}</td>`).join('') + '</tr>'
        ).join('') + '</table></div>');
        table = null;
      }
    };
    for (const raw of stripFrontmatter(text).split('\n')) {
      const line = raw.trim();
      const h = line.match(/^(#{1,4})\s+(.*)/);
      if (h) {
        flushList(); flushTable();
        const lvl = Math.min(h[1].length + 1, 5); // demote: page h1 -> h2
        out.push(`<h${lvl}>${mdInline(h[2])}</h${lvl}>`);
      } else if (/^-\s+/.test(line)) {
        flushTable();
        (list = list || []).push('<li>' + mdInline(line.replace(/^-\s+/, '')) + '</li>');
      } else if (/^\|.*\|$/.test(line)) {
        flushList();
        if (/^[|\s:-]+$/.test(line)) continue; // separator row
        (table = table || []).push(line.slice(1, -1).split('|').map(c => c.trim()));
      } else if (line) {
        flushList(); flushTable();
        out.push('<p>' + mdInline(line) + '</p>');
      } else {
        flushList(); flushTable();
      }
    }
    flushList(); flushTable();
    return out.join('');
  }

  // ---------- plan ----------
  const LS_PLAN = 'daylog.plancache';
  const PLAN_PAGES = [
    { path: 'wiki/status/current-status.md', title: 'Current status' },
    { path: 'wiki/protocol/rollout-plan.md', title: 'Rollout plan' }
  ];
  const PLAN_TTL = 15 * 60 * 1000;
  let planAt = 0; // last successful fetch (this session)

  function weekCard(statusMd, rolloutMd) {
    // Best-effort extraction; any miss -> no card, full pages still render below.
    if (!statusMd || !rolloutMd) return '';
    const wk = statusMd.match(/\bWeek\s+(\d+)\b/);
    if (!wk) return '';
    const n = Number(wk[1]);
    const focus = key => {
      const r = rolloutMd.match(new RegExp('^\\|\\s*' + key + '\\s*\\|(.*)\\|\\s*$', 'm'));
      return r ? r[1].trim() : null;
    };
    const thisWk = focus(n);
    if (!thisWk) return '';
    const nextKey = focus(n + 1) !== null ? String(n + 1) : 'Steady state';
    const nextWk = focus(n + 1) !== null ? focus(n + 1) : focus('Steady state');
    let html = `<div class="weekcard"><div class="wk">This week — Week ${n}</div><div>${mdInline(thisWk)}</div>`;
    if (nextWk) html += `<div class="next"><div class="wk">Next — ${nextKey === 'Steady state' ? 'Steady state' : 'Week ' + nextKey}</div><div>${mdInline(nextWk)}</div></div>`;
    return html + '</div>';
  }

  function renderPlan(texts) {
    const parts = [weekCard(texts[0], texts[1])];
    PLAN_PAGES.forEach((p, i) => {
      parts.push(texts[i] == null
        ? `<p class="empty">Couldn’t load ${p.path}</p>`
        : mdRender(texts[i]));
    });
    $('planBody').innerHTML = parts.join('');
  }

  function planStatus(msg, withRetry) {
    const st = $('planStatus');
    st.textContent = msg;
    if (withRetry) {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = 'Retry';
      b.style.cssText = 'margin-left:8px;font:inherit;color:var(--ink);background:none;border:none;text-decoration:underline;cursor:pointer';
      b.addEventListener('click', () => openPlan(true));
      st.appendChild(b);
    }
  }

  async function openPlan(force) {
    if (!cfg) { $('planBody').innerHTML = '<p class="empty">Connect in settings first.</p>'; return; }
    if (!force && planAt && Date.now() - planAt < PLAN_TTL) return; // fresh enough
    planStatus('Loading…');
    const texts = await Promise.all(PLAN_PAGES.map(p => ghGet(p.path).catch(() => null)));
    if (texts.every(t => t == null)) {
      const cached = JSON.parse(localStorage.getItem(LS_PLAN) || 'null');
      if (cached) {
        renderPlan(cached.texts);
        const t = new Date(cached.at);
        planStatus(`Offline — plan cached ${String(t.getHours()).padStart(2, '0')}:${String(t.getMinutes()).padStart(2, '0')}.`, true);
      } else {
        planStatus('Couldn’t load the plan.', true);
      }
      return;
    }
    planAt = Date.now();
    localStorage.setItem(LS_PLAN, JSON.stringify({ texts, at: planAt }));
    renderPlan(texts);
    planStatus('');
  }

  // ---------- meals ----------
  const LS_MEALS = 'daylog.mealscache';
  const MEALS_TTL = 5 * 60 * 1000;
  const BUDGETS = { sat_fat_g: 13, free_sugar_g: 25, fiber_g: 30 }; // overridable via nutrition-daily.json "budgets"
  let mealsAt = 0;

  function parseMealLog(md, iso) {
    const out = [];
    for (const line of (md || '').split('\n')) {
      const m = line.match(/^-\s+(\d{4}-\d{2}-\d{2}) (\d{2}:\d{2})\s*\|\s*[^|]*\|\s*(.*)$/);
      if (m && m[1] === iso) out.push({ time: m[2], desc: m[3].trim() });
    }
    return out;
  }
  function median(a) {
    const s = [...a].sort((x, y) => x - y), m = s.length >> 1;
    return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
  }

  // Budget strip: a value tick on a zoned band, same grammar as a lab-report reference range.
  // dir 'max' = stay under budget (cap at 52% of band); dir 'min' = reach budget (cap at 60%).
  function stripHtml(label, link, val, budget, dir, note) {
    const scale = dir === 'min' ? budget / 0.60 : budget / 0.52;
    const raw = 100 * (val || 0) / scale;
    const pos = Math.min(97, Math.max(2, raw));
    const zones = dir === 'min'
      ? '<div class="zone z-over" style="width:36%"></div><div class="zone z-watch" style="width:24%"></div><div class="zone z-good" style="width:40%"></div>'
      : '<div class="zone z-good" style="width:52%"></div><div class="zone z-watch" style="width:28%"></div><div class="zone z-over" style="width:20%"></div>';
    const st = dir === 'min'
      ? (raw >= 60 ? 'good' : raw >= 36 ? 'watch' : 'over')
      : (raw <= 52 ? 'good' : raw <= 80 ? 'watch' : 'over');
    return `<div class="strip">
      <div class="top"><span class="name">${label} <small>${link}</small></span>
      <span class="val">${val ?? '—'} <small>of ${budget} g</small></span></div>
      <div class="band">${zones}<div class="capmark" style="left:${dir === 'min' ? 60 : 52}%"></div><div class="tick ${st}" style="left:${pos}%"></div></div>
      ${note ? `<div class="capnote">${escHtml(note)}</div>` : ''}
    </div>`;
  }

  function sparkSvg(vals, budget, dir) {
    const pts = vals.map((v, i) => v == null ? null : { x: 6 + i * 31.3, v });
    const nums = vals.filter(v => v != null);
    if (!nums.length) return '<svg viewBox="0 0 200 30" preserveAspectRatio="none" aria-hidden="true"></svg>';
    let lo = Math.min(...nums), hi = Math.max(...nums);
    if (hi - lo < 1e-9) { lo -= 1; hi += 1; }
    const y = v => 26 - 20 * (v - lo) / (hi - lo);
    let out = '', run = [];
    const flush = () => {
      if (run.length > 1) out += `<polyline points="${run.join(' ')}" fill="none" stroke="var(--ink)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
      run = [];
    };
    for (const p of pts) { if (p) run.push(p.x.toFixed(1) + ',' + y(p.v).toFixed(1)); else flush(); }
    flush();
    let last = null;
    for (const p of pts) if (p) last = p;
    for (const p of pts) if (p && p !== last) out += `<circle cx="${p.x.toFixed(1)}" cy="${y(p.v).toFixed(1)}" r="2" fill="var(--ink)"/>`;
    const col = budget == null ? 'var(--ink)'
      : dir === 'min'
        ? (last.v >= budget ? 'var(--done)' : last.v >= 0.6 * budget ? 'var(--watch)' : 'var(--missed)')
        : (last.v <= budget ? 'var(--done)' : last.v <= 1.5 * budget ? 'var(--watch)' : 'var(--missed)');
    out += `<circle cx="${last.x.toFixed(1)}" cy="${y(last.v).toFixed(1)}" r="3" fill="${col}"/>`;
    return `<svg viewBox="0 0 200 30" preserveAspectRatio="none" aria-hidden="true">${out}</svg>`;
  }

  function renderMeals(nutri, mealMd) {
    const iso = today();
    const log = parseMealLog(mealMd, iso);
    const budgets = Object.assign({}, BUDGETS, (nutri && nutri.budgets) || {});
    const day = nutri && Array.isArray(nutri.days) ? nutri.days.find(d => d.date === iso) : null;
    const t = (day && day.totals) || {};

    $('mealsSub').textContent = prettyDate(iso) + (log.length ? ' · through ' + log[log.length - 1].time : ' · nothing logged yet');
    const parts = [];

    if (day) {
      parts.push(`<div class="sumline"><span class="kcal">${(t.kcal || 0).toLocaleString('en-US')}</span><span class="unit">kcal${day.partial ? ' so far' : ''}</span><span class="sep">·</span><span class="unit"><b>${t.protein_g ?? '—'} g</b> protein</span><span class="sep">·</span><span class="unit"><b>${log.length}</b> entries</span></div>`);
    } else if (log.length) {
      parts.push(`<div class="sumline"><span class="kcal">${log.length}</span><span class="unit">entr${log.length === 1 ? 'y' : 'ies'} logged — analysis pending</span></div>`);
    }

    if (day) {
      const n = day.notes || {};
      parts.push('<div class="mcard"><div class="mtitle"><h3>Watch markers</h3><span class="why">daily budgets</span></div>'
        + stripHtml('Saturated fat', '→ ApoB / LDL', t.sat_fat_g, budgets.sat_fat_g, 'max', n.sat_fat)
        + stripHtml('Free sugar', '→ A1c', t.free_sugar_g, budgets.free_sugar_g, 'max', n.free_sugar)
        + stripHtml('Fiber', '→ viscous-fiber lever', t.fiber_g, budgets.fiber_g, 'min', n.fiber)
        + '</div>');
    } else {
      parts.push('<div class="mcard"><div class="mtitle"><h3>Watch markers</h3></div><p class="empty" style="margin:10px 0">No analysis for today yet — strips fill in after the next review pass.</p></div>');
    }

    if (log.length) {
      const pool = day && Array.isArray(day.meals) ? day.meals.slice() : [];
      const rows = log.map(e => {
        const i = pool.findIndex(m => m.time === e.time);
        const m = i >= 0 ? pool.splice(i, 1)[0] : null;
        return `<div class="meal-row"><span class="t">${e.time.replace(/^0/, '')}</span><span class="what"><span class="res ${m ? m.res : 'est'}"></span>${escHtml(e.desc)}</span><span class="kc">${m ? m.kcal : '—'}</span></div>`;
      }).join('');
      parts.push(`<div class="mcard"><div class="mtitle"><h3>Today’s plate</h3><span class="why">kcal · from meal-log.md</span></div>${rows}<div class="mlegend"><span><span class="res reg"></span>label</span><span><span class="res rec"></span>recipe</span><span><span class="res est"></span>estimated</span></div></div>`);
    } else {
      parts.push('<div class="mcard"><p class="empty" style="margin:10px 0">Nothing logged today — say “Hey Siri, Kiwi”.</p></div>');
    }

    if (nutri && Array.isArray(nutri.days) && nutri.days.length) {
      const byDate = new Map(nutri.days.map(d => [d.date, d.totals || {}]));
      const win = [];
      for (let i = 6; i >= 0; i--) win.push(shiftDate(iso, -i));
      const sparks = [
        { lbl: 'Calories', key: 'kcal', budget: null, dir: 'max' },
        { lbl: 'Sat fat', key: 'sat_fat_g', budget: budgets.sat_fat_g, dir: 'max' },
        { lbl: 'Free sugar', key: 'free_sugar_g', budget: budgets.free_sugar_g, dir: 'max' },
        { lbl: 'Fiber', key: 'fiber_g', budget: budgets.fiber_g, dir: 'min' }
      ];
      const rows = sparks.map(s => {
        const vals = win.map(d => byDate.has(d) && byDate.get(d)[s.key] != null ? byDate.get(d)[s.key] : null);
        const nums = vals.filter(v => v != null);
        const nowV = vals[6];
        const fmt = v => s.key === 'kcal' ? Math.round(v).toLocaleString('en-US') : Math.round(v * 10) / 10 + ' g';
        const nowTxt = nowV == null ? '—' : fmt(nowV);
        const sub = nums.length >= 3 ? '7-d median ' + fmt(median(nums)) : (day && day.partial ? 'partial day' : '');
        return `<div class="spark-row"><span class="lbl">${s.lbl}</span>${sparkSvg(vals, s.budget, s.dir)}<span class="now">${nowTxt}<small>${sub}</small></span></div>`;
      }).join('');
      parts.push(`<div class="mcard"><div class="mtitle"><h3>Last 7 days</h3><span class="why">analyzed days</span></div>${rows}</div>`);
    }

    if (day && day.capture) {
      const c = day.capture;
      parts.push(`<div class="capline">Capture quality: <b>${c.weighed} of ${c.entries}</b> weighed · <b>${c.label_exact}</b> label-exact · <b>${c.recipe}</b> recipe</div>`);
    }
    $('mealsBody').innerHTML = parts.join('');
  }

  function renderMealsSafe(nutriTxt, mealMd) {
    let nutri = null;
    try { nutri = nutriTxt ? JSON.parse(nutriTxt) : null; } catch (e) { /* malformed analysis file — render log only */ }
    renderMeals(nutri, mealMd);
  }
  function mealsStatus(msg, withRetry) {
    const st = $('mealsStatus');
    st.textContent = msg;
    if (withRetry) {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = 'Retry';
      b.style.cssText = 'margin-left:8px;font:inherit;color:var(--ink);background:none;border:none;text-decoration:underline;cursor:pointer';
      b.addEventListener('click', () => openMeals(true));
      st.appendChild(b);
    }
  }
  async function openMeals(force) {
    if (!cfg) { $('mealsBody').innerHTML = '<p class="empty">Connect in settings first.</p>'; return; }
    if (!force && mealsAt && Date.now() - mealsAt < MEALS_TTL) return;
    mealsStatus('Loading…');
    const [nutriTxt, mealMd] = await Promise.all([
      ghGet('data/nutrition-daily.json').catch(() => null),
      ghGet('data/meal-log.md').catch(() => null)
    ]);
    if (nutriTxt == null && mealMd == null) {
      const cached = JSON.parse(localStorage.getItem(LS_MEALS) || 'null');
      if (cached) {
        renderMealsSafe(cached.nutriTxt, cached.mealMd);
        mealsStatus('Offline — showing cached data.', true);
      } else {
        mealsStatus('Couldn’t load meal data.', true);
      }
      return;
    }
    mealsAt = Date.now();
    localStorage.setItem(LS_MEALS, JSON.stringify({ nutriTxt, mealMd, at: mealsAt }));
    renderMealsSafe(nutriTxt, mealMd);
    mealsStatus('');
  }

  // ---------- tabs ----------
  const TABS = ['main', 'progress', 'meals', 'plan'];
  let tab = 'main';
  function showTab(name) {
    tab = name;
    $('settings').classList.add('hidden');
    for (const t of TABS) $(t).classList.toggle('hidden', t !== name);
    document.querySelectorAll('.tabrow button').forEach(b =>
      b.classList.toggle('active', b.dataset.tab === name));
    if (name === 'progress') renderProgress();
    if (name === 'meals') openMeals();
    if (name === 'plan') openPlan();
  }

  // ---------- settings ----------
  function showSettings(show) {
    $('settings').classList.toggle('hidden', !show);
    if (show) {
      for (const t of TABS) $(t).classList.add('hidden');
      if (cfg) { $('cfgRepo').value = cfg.repo; $('cfgToken').value = cfg.token; }
    } else {
      showTab(tab);
    }
  }
  async function connect() {
    const repo = $('cfgRepo').value.trim() || 'bykau/personal-improvement';
    const token = $('cfgToken').value.trim();
    const st = $('setupStatus');
    if (!token) { st.textContent = 'Token required.'; st.className = 'status err'; return; }
    st.textContent = 'Checking…'; st.className = 'status';
    cfg = { repo, token };
    try {
      await loadAll();
      localStorage.setItem(LS_CFG, JSON.stringify(cfg));
      st.textContent = '';
      showSettings(false);
    } catch (e) {
      st.textContent = e.message; st.className = 'status err';
      cfg = JSON.parse(localStorage.getItem(LS_CFG) || 'null');
    }
  }

  // ---------- init ----------
  $('gearBtn').addEventListener('click', () => showSettings($('settings').classList.contains('hidden')));
  document.querySelectorAll('.tabrow button').forEach(b =>
    b.addEventListener('click', () => showTab(b.dataset.tab)));
  $('connectBtn').addEventListener('click', connect);
  $('prevBtn').addEventListener('click', () => { date = shiftDate(date, -1); loadDay(); });
  $('nextBtn').addEventListener('click', () => { if (date < today()) { date = shiftDate(date, 1); loadDay(); } });
  $('note').addEventListener('input', e => { note = e.target.value; saveDraft(); setStatus('Unsaved changes'); });
  $('commitBtn').addEventListener('click', commitDay);

  cfg = JSON.parse(localStorage.getItem(LS_CFG) || 'null');
  if (cfg) {
    showSettings(false);
    loadAll().catch(e => setStatus(e.message, true));
  } else {
    showSettings(true);
  }
})();
</script>
</body>
</html>
